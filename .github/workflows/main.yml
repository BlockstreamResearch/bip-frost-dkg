name: Tests
on: [push, pull_request]
jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.11
      - name: Install mypy
        run: pip install mypy
      - name: Install ruff
        run: pip install ruff
      - name: Install pydoc-markdown
        run: pip install pydoc-markdown
      - name: Run tests
        run: ./python/tests.sh
      - name: Run example
        run: ./python/example.py && ./python/example.py --faulty-participant
      - name: Check that test vectors are up to date
        run: ./python/gen_vectors.py && git diff --exit-code
      - name: Check if README.md has latest pydoc export
        run: ./update-pydoc.sh && git diff --exit-code
